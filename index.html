<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Shopping Budget Optimizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Smart Shopping Budget Optimizer </h1>
            <p>using 0/1 Knapsack Algorithm with Interactive Dynamic Programming Visualizer</p>
        </div>

        <div class="content">
            <div class="input-section">
                <div class="form-group">
                    <label>Shopping Budget (Capacity):</label>
                    <input type="number" id="capacity" value="50" min="1" max="100">
                </div>
                <div class="form-group">
                    <label>Number of Items (n):</label>
                    <input type="number" id="numItems" value="4" min="1" max="10">
                </div>
            </div>

            <div class="input-row">
                <div class="form-group full-width">
                    <label>Item Names (comma separated):</label>
                    <input type="text" id="names" value="Milk,Eggs,Bread,Phone" placeholder="Milk,Eggs,Bread,Phone">
                </div>
                <div class="form-group full-width">
                    <label>Price (comma separated):</label>
                    <input type="text" id="weights" value="10,20,30,40" placeholder="10,20,30,40">
                </div>
                <div class="form-group full-width">
                    <label>Values/Benifit (comma separated):</label>
                    <input type="text" id="values" value="60,100,120,210" placeholder="60,100,120,210">
                </div>
            </div>

            <div class="button-group">
                <button class="btn" onclick="generateItems()">Generate Random Items</button>
                <button class="btn btn-success" onclick="solveKnapsack()">Solve Knapsack</button>
            </div>

            <div class="results" id="results" style="display: none;">
                <h3>Results</h3>
                <div id="resultDisplay"></div>
                <div class="knapsack-items" id="itemDisplay"></div>
            </div>

            <div id="dpTableContainer" style="display: none;">
                <h3>Dynamic Programming Table</h3>
                <div class="dp-table">
                    <table id="dpTable"></table>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
